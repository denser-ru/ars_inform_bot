version: '3'

services:
  # Сервис для вашего телеграм бота
  ars_inform_dev:
    build: . # Ссылка на Dockerfile в текущей папке
    networks:
      - app-network # Указываем, что бот принадлежит к сети app-network
    container_name: ars_inform_bot_dev # Задаем сетевое имя для контейнера
    volumes: # Монтируем папку с кодом приложения в контейнер
      - ./:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # network_mode: host

  # Сервис для менеджера рассылки
  ars_inform_subscription_manager_dev:
    build:
      context: .  # Используем тот же контекст, что и для бота
      dockerfile: Dockerfile.sm  # Указываем Dockerfile для менеджера
    networks:
      - app-network
    container_name: subscription_manager_dev
    volumes:
      - ./subscription_manager:/app  # Монтируем ту же папку с кодом, что и для бота
      - ./utils:/app/utils
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # environment:
    #   - DB_HOST=...  # Укажите параметры подключения к БД
    #   - DB_NAME=...
    #   - DB_USER=...
    #   - DB_PASSWORD=...
    #   - WEBHOOK_HOST=http://ars_inform_bot_dev  # URL вебхука бота 


# Определяем сеть для связи между сервисами
networks:
  app-network:
    driver: bridge
    name: ars_inform # Задаем имя сети

